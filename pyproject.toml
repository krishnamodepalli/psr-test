[project]
name = "versioning-test"
version = "1.0.0"
description = "A small project to test versioning and conventional commits"
readme = "README.md"
authors = [{ name = "Gemini Bot", email = "bot@example.com" }]
license = { text = "MIT" }
dependencies = []

[project.urls]
Changelog = "https://github.com/example/versioning-test/blob/master/CHANGELOG.md"

[tool.semantic_release]
version_toml = [
    "pyproject.toml:project.version"
]
major_on_zero = false
branch = "master"
upload_to_pypi = false
upload_to_release = true
build_command = "pip install build && python -m build"

[tool.semantic_release.changelog]
changelog_file = "CHANGELOG.md"
exclude_commit_patterns = []

[tool.semantic_release.commit_parser_options]
allowed_tags = ["feat", "fix", "perf", "docs", "refactor", "test", "build", "ci", "chore", "revert"]
minor_tags = ["feat"]
patch_tags = ["fix", "perf", "docs", "refactor"]
default_bump_level = 0
